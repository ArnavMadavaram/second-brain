<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" font-family="Arial, sans-serif">
<title>Second Brain high level system design</title>
<desc>The ingestion flow processes personal text into searchable storage. The query flow answers questions using that storage. The custom embedding model is used in both flows.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="620" fill="#ffffff"/>

<text x="40" y="30" font-size="15" font-weight="bold" fill="#1a1a1a">Ingestion flow</text>
<text x="40" y="48" font-size="12" fill="#666666">runs when data goes in</text>

<g>
<rect x="40" y="62" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="86" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Raw data</text>
<text x="105" y="104" font-size="12" fill="#5F5E5A" text-anchor="middle">export, journals</text>
</g>

<g>
<rect x="200" y="62" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="265" y="86" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Classifier</text>
<text x="265" y="104" font-size="12" fill="#534AB7" text-anchor="middle">keeps personal</text>
</g>

<g>
<rect x="360" y="62" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="425" y="86" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Chunk</text>
<text x="425" y="104" font-size="12" fill="#5F5E5A" text-anchor="middle">split into pieces</text>
</g>

<g>
<rect x="520" y="62" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="585" y="86" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">Tag emotion</text>
<text x="585" y="104" font-size="12" fill="#993C1D" text-anchor="middle">valence, intensity</text>
</g>

<line x1="170" y1="90" x2="198" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="330" y1="90" x2="358" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="90" x2="518" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M585 118 L585 150 L425 150 L425 172" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g>
<rect x="360" y="174" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="425" y="194" font-size="14" font-weight="bold" fill="#412402" text-anchor="middle">Embedding model</text>
<text x="425" y="212" font-size="12" fill="#854F0B" text-anchor="middle">your custom one</text>
</g>

<line x1="360" y1="202" x2="250" y2="202" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<g>
<rect x="110" y="174" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="175" y="194" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Vector store</text>
<text x="175" y="212" font-size="12" fill="#0F6E56" text-anchor="middle">searchable memory</text>
</g>

<line x1="40" y1="270" x2="640" y2="270" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

<text x="40" y="300" font-size="15" font-weight="bold" fill="#1a1a1a">Query flow</text>
<text x="40" y="318" font-size="12" fill="#666666">runs when you ask something</text>

<g>
<rect x="40" y="332" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="356" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Question</text>
<text x="105" y="374" font-size="12" fill="#5F5E5A" text-anchor="middle">user types it</text>
</g>

<g>
<rect x="200" y="332" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="265" y="356" font-size="14" font-weight="bold" fill="#412402" text-anchor="middle">Embedding model</text>
<text x="265" y="374" font-size="12" fill="#854F0B" text-anchor="middle">same custom one</text>
</g>

<g>
<rect x="360" y="332" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="425" y="356" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Search store</text>
<text x="425" y="374" font-size="12" fill="#0F6E56" text-anchor="middle">find closest</text>
</g>

<g>
<rect x="520" y="332" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="585" y="356" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Top matches</text>
<text x="585" y="374" font-size="12" fill="#5F5E5A" text-anchor="middle">relevant memories</text>
</g>

<line x1="170" y1="360" x2="198" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="330" y1="360" x2="358" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="360" x2="518" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M585 388 L585 420 L425 420 L425 442" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g>
<rect x="360" y="444" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="425" y="468" font-size="14" font-weight="bold" fill="#042C53" text-anchor="middle">Claude</text>
<text x="425" y="486" font-size="12" fill="#185FA5" text-anchor="middle">writes answer</text>
</g>

<line x1="360" y1="472" x2="250" y2="472" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<g>
<rect x="110" y="444" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="175" y="468" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Answer</text>
<text x="175" y="486" font-size="12" fill="#5F5E5A" text-anchor="middle">shown with sources</text>
</g>

<line x1="175" y1="332" x2="175" y2="240" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="186" y="290" font-size="12" fill="#888780">query flow reads from the same store</text>

</svg>
